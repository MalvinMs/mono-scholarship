[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=default,scoring,notifications
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=%(ENV_QUEUE_WORKERS)s
redirect_stderr=true
stdout_logfile=/app/storage/logs/queue-worker.log
stopwaitsecs=10

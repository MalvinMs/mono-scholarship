# ============================================================
# Platform Beasiswa — Docker Compose (Shared Services)
# ============================================================
# Redis  ·  MinIO (S3)
#
# Usage:
#   Development:   docker compose up -d                 (auto-includes override)
#   Staging:        docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   Production:     docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: beasiswa-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: beasiswa-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: beasiswa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} 2>/dev/null; do
        echo 'Waiting for MinIO...';
        sleep 3;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-development-files};
      mc anonymous set private local/${MINIO_BUCKET:-development-files};
      echo 'MinIO bucket ready';
      exit 0;
      "

volumes:
  redis_data:
  minio_data:
